name: Build CV

on:
  push:
    branches: [ "master" ]

jobs:
  build cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Compile CV
        uses: hspaans/latexmk-action@v2.1.0
        with:
          format: pdf
          filename: main.tex

